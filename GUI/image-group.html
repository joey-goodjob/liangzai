<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 组图生成工具</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* 组图工具专用s样式 */
      .config-section {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        padding: 24px;
        margin-bottom: 24px;
      }

      .config-section h3 {
        font-size: 16px;
        color: var(--text-secondary);
        margin-bottom: 20px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
      }

      .config-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
      }

      .config-item {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .config-item label {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .config-item input,
      .config-item select {
        padding: 12px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 14px;
      }

      .config-item input:focus,
      .config-item select:focus {
        outline: none;
        border-color: var(--accent-primary);
      }

      .config-item input::placeholder {
        color: var(--text-muted);
      }

      /* 左右布局区域 */
      .input-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
        margin-bottom: 24px;
      }

      .input-left,
      .input-right {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        padding: 24px;
      }

      .input-left {
        display: flex;
        flex-direction: column;
      }

      .input-right h3 {
        font-size: 16px;
        color: var(--text-secondary);
        margin-bottom: 16px;
      }

      .input-right h3 span {
        font-size: 12px;
        color: var(--text-muted);
        margin-left: 8px;
      }

      .prompt-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .prompt-header h3 {
        font-size: 16px;
        color: var(--text-secondary);
      }

      .char-count {
        font-size: 12px;
        color: var(--text-muted);
      }

      .prompt-textarea {
        width: 100%;
        flex: 1;
        min-height: 150px;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        padding: 16px;
        color: var(--text-primary);
        font-size: 14px;
        resize: none;
        line-height: 1.6;
      }

      .prompt-textarea:focus {
        outline: none;
        border-color: var(--accent-primary);
      }

      .input-left .batch-upload-box {
        padding: 20px;
      }

      .input-left .upload-placeholder p {
        font-size: 12px;
      }

      .input-left .upload-icon {
        font-size: 32px;
      }

      .ref-images-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 16px;
      }

      .ref-image-item {
        position: relative;
        width: 100px;
        height: 100px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border-color);
      }

      .ref-image-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .ref-image-item .remove-btn {
        position: absolute;
        top: 4px;
        right: 4px;
        width: 22px;
        height: 22px;
        background: var(--error);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: var(--transition);
      }

      .ref-image-item:hover .remove-btn {
        opacity: 1;
      }

      .result-section {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius-lg);
        padding: 24px;
      }

      .result-section h3 {
        font-size: 16px;
        color: var(--text-secondary);
        margin-bottom: 16px;
      }

      .result-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
        min-height: 150px;
      }

      .result-card {
        position: relative;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: var(--border-radius);
        overflow: hidden;
      }

      .result-card img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
      }

      .result-card .overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.8),
          transparent 50%
        );
        opacity: 0;
        transition: var(--transition);
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 12px;
        pointer-events: none;
      }

      .result-card:hover .overlay {
        opacity: 1;
      }

      .result-card .download-btn {
        background: var(--accent-primary);
        border: none;
        padding: 8px 16px;
        border-radius: 6px;
        color: white;
        font-size: 12px;
        cursor: pointer;
        pointer-events: auto;
      }

      .result-actions {
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
        display: flex;
        justify-content: center;
        gap: 16px;
      }

      .status-text {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 8px;
      }

      .api-key-input {
        font-family: monospace;
      }

      /* 响应式：小屏幕时变回上下布局 */
      @media (max-width: 900px) {
        .input-section {
          grid-template-columns: 1fr;
        }

        .prompt-textarea {
          min-height: 120px;
        }
      }

      /* 人物图和场景图上传区域样式 */
      .upload-section {
        margin-bottom: 16px;
      }

      .upload-section:last-child {
        margin-bottom: 0;
      }

      .upload-section h4 {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 10px;
      }

      .upload-section h4 span {
        font-size: 12px;
        color: var(--text-muted);
        margin-left: 6px;
      }

      .character-upload-box,
      .scene-upload-box {
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .preview-container {
        position: relative;
        width: 100%;
        height: 120px;
        border-radius: 8px;
        overflow: hidden;
      }

      .preview-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .preview-container .remove-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 26px;
        height: 26px;
        background: var(--error);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.9;
        transition: var(--transition);
      }

      .preview-container .remove-btn:hover {
        opacity: 1;
        transform: scale(1.1);
      }

      .character-upload-box .upload-placeholder,
      .scene-upload-box .upload-placeholder {
        text-align: center;
      }

      .character-upload-box .upload-icon,
      .scene-upload-box .upload-icon {
        font-size: 28px;
      }

      .character-upload-box .upload-placeholder p,
      .scene-upload-box .upload-placeholder p {
        font-size: 12px;
        margin: 4px 0;
      }

      /* 场景图水平滚动预览样式 */
      .scene-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }

      .scene-header h4 {
        font-size: 14px;
        color: var(--text-secondary);
        margin: 0;
      }

      .clear-all-btn {
        padding: 4px 12px;
        background: var(--error);
        border: none;
        border-radius: 4px;
        color: white;
        font-size: 12px;
        cursor: pointer;
        opacity: 0.8;
        transition: var(--transition);
      }

      .clear-all-btn:hover {
        opacity: 1;
      }

      .scene-scroll-container {
        display: flex;
        gap: 12px;
        overflow-x: auto;
        padding: 12px 0;
        min-height: 100px;
        scrollbar-width: thin;
        scrollbar-color: var(--accent-primary) var(--bg-card);
      }

      .scene-scroll-container::-webkit-scrollbar {
        height: 6px;
      }

      .scene-scroll-container::-webkit-scrollbar-track {
        background: var(--bg-card);
        border-radius: 3px;
      }

      .scene-scroll-container::-webkit-scrollbar-thumb {
        background: var(--accent-primary);
        border-radius: 3px;
      }

      .scene-item {
        position: relative;
        flex-shrink: 0;
        width: 80px;
        height: 80px;
        border-radius: 8px;
        overflow: hidden;
        border: 2px solid var(--border-color);
        transition: var(--transition);
      }

      .scene-item:hover {
        border-color: var(--accent-primary);
      }

      .scene-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .scene-item .scene-number {
        position: absolute;
        bottom: 2px;
        left: 2px;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
      }

      .scene-item .scene-remove-btn {
        position: absolute;
        top: 2px;
        right: 2px;
        width: 20px;
        height: 20px;
        background: var(--error);
        border: none;
        border-radius: 50%;
        color: white;
        font-size: 12px;
        cursor: pointer;
        opacity: 0;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .scene-item:hover .scene-remove-btn {
        opacity: 1;
      }

      .scene-add-btn {
        flex-shrink: 0;
        width: 80px;
        height: 80px;
        border: 2px dashed var(--border-color);
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        transition: var(--transition);
      }

      .scene-add-btn:hover {
        border-color: var(--accent-primary);
        color: var(--accent-primary);
      }

      .scene-add-btn .add-icon {
        font-size: 24px;
        line-height: 1;
      }

      .scene-add-btn .add-text {
        font-size: 10px;
        margin-top: 4px;
      }

      /* 生成按钮区域 */
      .generate-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin: 24px 0;
      }

      .btn-cancel {
        background: var(--error);
      }

      .btn-cancel:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <!-- 顶部导航 -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🎨</span>
        <span class="logo-text">AI 组图生成工具</span>
      </div>
      <div class="status-bar">
        <span class="status-item" id="statusText">
          <span class="status-dot" id="statusDot"></span>
          准备就绪
        </span>
      </div>
    </header>

    <!-- 主要内容区 -->
    <main class="main-container">
      <!-- ========== 配置区域 ========== -->
      <section class="config-section">
        <h3>API 配置</h3>
        <div class="config-grid">
          <div class="config-item">
            <label>模型选择</label>
            <select id="modelSelect">
              <option value="doubao-seedream-4-5-251128">Seedream 4.5</option>
              <option value="doubao-seedream-5-0-260128">Seedream 5.0</option>
            </select>
          </div>
          <div class="config-item">
            <label>API Key</label>
            <input
              type="text"
              id="apiKeyInput"
              class="api-key-input"
              placeholder="输入您的 API Key（必填）"
            />
          </div>
          <div class="config-item">
            <label>图片尺寸</label>
            <select id="sizeSelect">
              <option value="2K">2K (2048x2048)</option>
              <option value="4K">4K (4096x4096)</option>
            </select>
          </div>
        </div>
      </section>

      <!-- ========== 提示词和参考图片区域（左右布局） ========== -->
      <section class="input-section">
        <!-- 左侧：姿势描述 -->
        <div class="input-left">
          <div class="prompt-header">
            <h3>描述</h3>
            <span class="char-count" id="charCount">0 字</span>
          </div>
          <textarea
            class="prompt-textarea"
            id="promptInput"
            placeholder="描述你想要生成的内容...&#10;&#10;例如：&#10;- 有场景图时：人物站立、坐姿、行走等姿势&#10;- 只有场景图时：一个穿白裙的女生站在海边&#10;- 纯文字时：一组四季变化的庭院插画"
          ></textarea>
          <p class="status-text">
            上传场景图可锁定场景不变，上传人物图可保持人物特征
          </p>
        </div>

        <!-- 右侧：图片上传 -->
        <div class="input-right">
          <!-- 人物图区域 -->
          <div class="upload-section">
            <h4>人物图 <span>(可选，1张)</span></h4>
            <div
              class="batch-upload-box character-upload-box"
              id="characterUpload"
            >
              <input
                type="file"
                id="characterImageInput"
                accept="image/*"
                hidden
              />
              <div class="upload-placeholder" id="characterPlaceholder">
                <span class="upload-icon">👤</span>
                <p>点击或拖拽上传人物图</p>
                <p class="upload-hint">支持 jpg/png/webp</p>
              </div>
              <div
                class="preview-container"
                id="characterPreview"
                style="display: none"
              >
                <img id="characterPreviewImg" src="" alt="人物图预览" />
                <button
                  class="remove-btn"
                  id="removeCharacterBtn"
                  type="button"
                >
                  ×
                </button>
              </div>
            </div>
          </div>

          <!-- 场景图区域 -->
          <div class="upload-section">
            <div class="scene-header">
              <h4>场景图 <span id="sceneCount">(0张)</span></h4>
              <button
                class="clear-all-btn"
                id="clearAllSceneBtn"
                style="display: none"
              >
                清空全部
              </button>
            </div>
            <div class="batch-upload-box scene-upload-box" id="sceneUpload">
              <input
                type="file"
                id="sceneImageInput"
                accept="image/*"
                multiple
                hidden
              />
              <div class="upload-placeholder" id="scenePlaceholder">
                <span class="upload-icon">🏞️</span>
                <p>点击或拖拽上传场景图（支持多选）</p>
                <p class="upload-hint">支持 jpg/png/webp，可上传多张</p>
              </div>
              <div
                class="scene-preview-container"
                id="scenePreviewContainer"
                style="display: none"
              >
                <div class="scene-scroll-wrapper" id="sceneScrollWrapper">
                  <!-- 场景图预览会动态添加到这里 -->
                </div>
                <div class="add-more-btn" id="addMoreSceneBtn">
                  <span>+</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- ========== 生成按钮 ========== -->
      <div class="generate-buttons">
        <button class="btn-primary btn-generate" id="generateBtn">
          <span class="btn-icon">🎨</span>
          生成组图
        </button>
        <button
          class="btn-secondary btn-cancel"
          id="cancelBtn"
          style="display: none"
        >
          <span>⏹️</span> 取消生成
        </button>
      </div>

      <!-- ========== 结果区域 ========== -->
      <section class="result-section" style="margin-top: 24px">
        <h3>生成结果</h3>
        <div class="result-grid" id="resultGrid">
          <div class="empty-state">
            <span class="empty-icon">🖼️</span>
            <p>等待生成...</p>
          </div>
        </div>
        <div class="result-actions" id="resultActions" style="display: none">
          <button class="btn-secondary" id="downloadAllBtn">
            <span>📥</span> 一键下载全部
          </button>
        </div>
      </section>
    </main>

    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p id="loadingText">生成中...</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <!-- 图片预览模态框（Lightbox） -->
    <div class="lightbox" id="lightbox">
      <button class="lightbox-close" id="lightboxClose">×</button>
      <button class="lightbox-prev" id="lightboxPrev">‹</button>
      <button class="lightbox-next" id="lightboxNext">›</button>
      <div class="lightbox-content">
        <img id="lightboxImage" src="" alt="预览图片" />
      </div>
      <div class="lightbox-footer">
        <span id="lightboxCounter">1 / 4</span>
        <button class="btn-select-model" id="lightboxDownload">下载此图</button>
      </div>
    </div>

    <script src="image-group.js"></script>
  </body>
</html>
